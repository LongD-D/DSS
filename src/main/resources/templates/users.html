<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управління користувачами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/tasks" class="text-2xl font-bold text-blue-600">DSS 系统</a>

        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/tasks" class="hover:text-blue-600">任务</a>
            <a href="/decisions" class="hover:text-blue-600">决策</a>
            <a href="/roles" id="role-link" class="hover:text-blue-600 hidden">角色</a>
            <a href="/users" id="users-link" class="hover:text-blue-600 hidden">用户</a>
            <a href="/login" id="login-link" class="hover:text-blue-600">登录</a>
            <a href="#" id="logout-link" class="hover:text-red-600 hidden">退出</a>
        </nav>
    </div>
</header>

<div class="container mt-4" id="admin-section" style="display: none;">
    <h2 class="mb-4">已注册用户列表</h2>
    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark text-center">
        <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>角色</th>
            <th>Email</th>
            <th>电话</th>
            <th>更新角色</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="user-table-body">
        <tr th:each="user : ${users}">
            <td th:text="${user.id}" th:attr="data-user-id=${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td>
                <span th:each="role : ${user.roles}" th:text="${role.ukrName} + ' '"></span>
            </td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.phone_number}"></td>
            <td>
                <div class="d-flex gap-2 align-items-center">
                    <select class="form-select form-select-sm role-select">
                        <option th:each="role : ${roles}" th:value="${role.name}" th:text="${role.ukrName}"
                                th:selected="${user.roles.contains(role)}"></option>
                    </select>
                    <button class="btn btn-sm btn-primary change-role-btn">修改</button>
                </div>
            </td>
            <td>
                <button class="btn btn-sm btn-danger delete-user-btn">删除</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    const token = localStorage.getItem('token');

    fetch('/api/v1/auth/user', {
        headers: { 'Authorization': `Bearer ${token}` }
    })
        .then(res => res.json())
        .then(user => {
            const roles = user.roles.map(r => r.name);
            if (!roles.includes('ROLE_ADMIN')) {
                alert("У вас немає прав для перегляду цієї сторінки");
                window.location.href = '/';
            } else {
                document.getElementById('admin-section').style.display = 'block';
                setupRoleChangeHandlers();
            }
        })
        .catch(() => window.location.href = '/');

    function setupRoleChangeHandlers() {
        const rows = document.querySelectorAll('#user-table-body tr');
        rows.forEach(row => {
            const userId = parseInt(row.querySelector('[data-user-id]').getAttribute('data-user-id'));
            const select = row.querySelector('.role-select');
            const changeButton = row.querySelector('.change-role-btn');
            const deleteButton = row.querySelector('.delete-user-btn');

            changeButton.addEventListener('click', () => {
                const selectedRole = select.value;
                fetch(`/api/v1/users/${userId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: selectedRole
                })
                    .then(res => {
                        if (res.ok) {
                            alert('Роль оновлено!');
                            location.reload();
                        } else {
                            return res.text().then(text => { throw new Error(text); });
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        alert('Помилка при оновленні ролі');
                    });
            });

            deleteButton.addEventListener('click', () => {
                if (confirm('Ви впевнені, що хочете видалити цього користувача?')) {
                    fetch(`/api/v1/users/${userId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    })
                        .then(res => {
                            if (res.ok) {
                                alert('Користувача видалено!');
                                location.reload();
                            } else {
                                return res.text().then(text => { throw new Error(text); });
                            }
                        })
                        .catch(err => {
                            console.error(err);
                            alert('Помилка при видаленні користувача');
                        });
                }
            });
        });
    }
</script>
<script>
    const token = localStorage.getItem('token');
    if (token) {
        document.getElementById('login-link').classList.add('hidden');
        document.getElementById('logout-link').classList.remove('hidden');

        fetch('/api/v1/auth/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => res.json())
            .then(user => {
                const roles = user.roles.map(r => r.name);
                if (roles.includes('ROLE_ADMIN')) {
                    document.getElementById('role-link').classList.remove('hidden');
                    document.getElementById('users-link').classList.remove('hidden');
                }
            });
    }

    document.getElementById('logout-link')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
</body>
</html>
