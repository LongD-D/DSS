<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑分析与评价任务</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-5xl mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
    <h1 class="text-3xl font-bold mb-6 text-center">编辑分析与评价任务</h1>
    <input type="hidden" id="taskId" th:value="${task.id}">

    <form id="edit-task-form" class="space-y-4">
        <input type="text" id="title" class="w-full border rounded px-4 py-2" th:value="${task.title}">
        <textarea id="description" class="w-full border rounded px-4 py-2" rows="4" th:text="${task.description}"></textarea>
        <select id="category" class="w-full border rounded px-4 py-2">
            <option value="ENERGETIC" th:selected="${task.category.name() == 'ENERGETIC'}">能源</option>
            <option value="ECONOMY" th:selected="${task.category.name() == 'ECONOMY'}">经济</option>
            <option value="ECOLOGY" th:selected="${task.category.name() == 'ECOLOGY'}">生态</option>
        </select>
        <select id="status" class="w-full border rounded px-4 py-2">
            <option value="NEW" th:selected="${task.status.name() == 'NEW'}">新建</option>
            <option value="SOLVED" th:selected="${task.status.name() == 'SOLVED'}">已解决</option>
            <option value="EMERGENCY" th:selected="${task.status.name() == 'EMERGENCY'}">紧急</option>
        </select>

        <div>
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-xl font-semibold">指标节点管理（支持多层级）</h2>
                <button type="button" id="add-param" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg">添加节点</button>
            </div>
            <div id="parameters-container" class="space-y-3"></div>
        </div>

        <div class="flex justify-center mt-8">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-8 rounded-lg">保存修改</button>
        </div>
    </form>
</div>

<script th:inline="javascript">
    const initialParameters = /*[[${task.taskParameters}]]*/ [];
</script>
<script>
    const taskId = parseInt(document.getElementById('taskId').value);
    const token = localStorage.getItem('token');
    const container = document.getElementById('parameters-container');

    function newNodeId() { return (window.crypto?.randomUUID?.() || ('node-' + Date.now() + '-' + Math.random().toString(16).slice(2))); }
    function getOptDir(block) { return (block.querySelector('.opt-dir').value === '最小化' || block.querySelector('.opt-dir').value === 'MINIMIZE') ? 'MINIMIZE' : 'MAXIMIZE'; }

    function refreshParentOptions() {
        const nodes = [...document.querySelectorAll('.parameter-block')];
        const choices = nodes.map(b => ({id: b.querySelector('.param-node-id').value, name: b.querySelector('.param-name').value || '未命名节点'}));
        nodes.forEach(block => {
            const current = block.querySelector('.param-parent-id').value;
            const selfId = block.querySelector('.param-node-id').value;
            const select = block.querySelector('.param-parent-id');
            select.innerHTML = '<option value="">(根节点)</option>';
            choices.filter(c => c.id !== selfId).forEach(c => {
                const o = document.createElement('option'); o.value = c.id; o.textContent = c.name;
                if (current === c.id) o.selected = true;
                select.appendChild(o);
            });
        });
    }

    function recomputeHierarchy() {
        const blocks = [...document.querySelectorAll('.parameter-block')];
        const byId = new Map(blocks.map(b => [b.querySelector('.param-node-id').value, b]));
        function calc(block, seen = new Set()) {
            const nodeId = block.querySelector('.param-node-id').value;
            const parentId = block.querySelector('.param-parent-id').value;
            if (!parentId || !byId.get(parentId) || seen.has(nodeId)) return { level: 1, path: nodeId };
            seen.add(nodeId);
            const parentMeta = calc(byId.get(parentId), seen);
            return { level: parentMeta.level + 1, path: parentMeta.path + '/' + nodeId };
        }
        blocks.forEach((b, i) => {
            const meta = calc(b);
            b.querySelector('.param-level').value = meta.level;
            b.querySelector('.param-path').value = meta.path;
            b.querySelector('.param-sort-order').value = i;
        });
    }

    function attachHandlers(block) {
        block.querySelector('.delete-param').onclick = () => { block.remove(); refreshParentOptions(); recomputeHierarchy(); };
        block.querySelector('.move-up').onclick = () => { const prev = block.previousElementSibling; if (prev) container.insertBefore(block, prev); recomputeHierarchy(); };
        block.querySelector('.move-down').onclick = () => { const next = block.nextElementSibling; if (next) container.insertBefore(next, block); recomputeHierarchy(); };
        block.querySelectorAll('.param-name,.param-parent-id').forEach(el => el.addEventListener('change', () => { refreshParentOptions(); recomputeHierarchy(); }));
    }

    function addNode(defaults = {}) {
        const block = document.createElement('div');
        block.className = 'border p-4 rounded bg-gray-50 parameter-block';
        block.innerHTML = `
          <input type="hidden" class="param-node-id" value="${defaults.nodeId || newNodeId()}">
          <div class="grid grid-cols-5 gap-3 mb-2">
            <input type="text" class="param-name border rounded px-2 py-1" placeholder="节点名称" value="${defaults.name || ''}">
            <select class="param-parent-id border rounded px-2 py-1"></select>
            <input type="number" step="0.01" class="param-weight border rounded px-2 py-1" placeholder="权重" value="${defaults.weight ?? 0}">
            <input type="text" class="param-unit border rounded px-2 py-1" placeholder="单位" value="${defaults.unit || ''}">
            <select class="opt-dir border rounded px-2 py-1"><option ${defaults.optimizationDirection === 'MAXIMIZE' ? 'selected' : ''}>最大化</option><option ${defaults.optimizationDirection === 'MINIMIZE' ? 'selected' : ''}>最小化</option></select>
          </div>
          <div class="grid grid-cols-5 gap-3 mb-2">
            <input type="number" class="param-level border rounded px-2 py-1 bg-gray-100" readonly>
            <input type="text" class="param-path border rounded px-2 py-1 bg-gray-100 col-span-2" readonly>
            <input type="number" class="param-sort-order border rounded px-2 py-1" readonly>
            <div class="flex gap-2">
              <button type="button" class="move-up bg-gray-500 text-white rounded px-2">↑</button>
              <button type="button" class="move-down bg-gray-500 text-white rounded px-2">↓</button>
              <button type="button" class="delete-param bg-red-500 text-white rounded px-2">✕</button>
            </div>
          </div>`;
        container.appendChild(block);
        attachHandlers(block);
        refreshParentOptions();
        if (defaults.parentId) block.querySelector('.param-parent-id').value = defaults.parentId;
        recomputeHierarchy();
    }

    document.getElementById('add-param').addEventListener('click', () => addNode());

    (initialParameters || []).forEach(p => addNode({
        nodeId: p.nodeId || `param-${p.id}`,
        parentId: p.parentId,
        name: p.name,
        weight: p.weight,
        unit: p.unit,
        optimizationDirection: p.optimizationDirection
    }));

    document.getElementById('edit-task-form').addEventListener('submit', function(event) {
        event.preventDefault();
        recomputeHierarchy();
        const parameters = [...document.querySelectorAll('.parameter-block')].map(block => {
            const parentSelect = block.querySelector('.param-parent-id');
            return {
                nodeId: block.querySelector('.param-node-id').value,
                parentId: parentSelect.value || null,
                path: block.querySelector('.param-path').value,
                level: parseInt(block.querySelector('.param-level').value || '1'),
                sortOrder: parseInt(block.querySelector('.param-sort-order').value || '0'),
                name: block.querySelector('.param-name').value,
                parentCriterion: parentSelect.value ? (parentSelect.selectedOptions[0]?.textContent || null) : null,
                weight: parseFloat(block.querySelector('.param-weight').value || '0'),
                unit: block.querySelector('.param-unit').value,
                optimizationDirection: getOptDir(block)
            };
        });

        fetch(`http://localhost:8080/api/v1/tasks/${taskId}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                status: document.getElementById('status').value,
                taskParameters: parameters
            })
        }).then(r => r.ok ? (alert('任务更新成功！'), location.href=`/tasks/${taskId}`) : alert('错误 更新 任务!'));
    });
</script>
</body>
</html>
