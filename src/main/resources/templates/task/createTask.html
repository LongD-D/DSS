<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>创建任务</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
<header class="fixed top-0 left-0 w-full z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/tasks" class="text-2xl font-bold text-blue-600">DSS 系统</a>

        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/tasks" class="hover:text-blue-600">任务</a>
            <a href="/decisions" class="hover:text-blue-600">方案</a>
            <a href="/roles" id="role-link" class="hover:text-blue-600 hidden">角色</a>
            <a href="/users" id="users-link" class="hover:text-blue-600 hidden">用户</a>
            <a href="/login" id="login-link" class="hover:text-blue-600">登录</a>
            <a href="#" id="logout-link" class="hover:text-red-600 hidden">退出</a>
        </nav>
    </div>
</header>

<div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold mb-6 text-center">创建新任务</h1>

    <form id="create-task-form" class="space-y-4">
        <div>
            <label class="block text-gray-700 font-semibold mb-2" for="title">任务名称</label>
            <input type="text" id="title" class="w-full border rounded px-4 py-2" placeholder="请输入名称">
        </div>

        <div>
            <label class="block text-gray-700 font-semibold mb-2" for="description">任务描述</label>
            <textarea id="description" class="w-full border rounded px-4 py-2" rows="4" placeholder="请输入描述"></textarea>
        </div>

        <div>
            <label class="block text-gray-700 font-semibold mb-2" for="category">类别</label>
            <select id="category" class="w-full border rounded px-4 py-2">
                <option value="ENERGETIC">能源</option>
                <option value="ECONOMY">经济</option>
                <option value="ECOLOGY">生态</option>
            </select>
        </div>

        <div>
            <label class="block text-gray-700 font-semibold mb-2" for="status">状态</label>
            <select id="status" class="w-full border rounded px-4 py-2">
                <option value="NEW">新建</option>
                <option value="SOLVED">已解决</option>
                <option value="EMERGENCY">紧急</option>
            </select>
        </div>

        <div>
            <h2 class="text-xl font-semibold mt-6 mb-2"> 任务参数</h2>
            <div id="parameters-container" class="space-y-4">
                <!-- Тут будуть 参数 -->
            </div>
            <button type="button" id="add-param" class="mt-4 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg">
                添加参数
            </button>
        </div>

        <div class="flex justify-center mt-8">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-8 rounded-lg">
                创建任务
            </button>
        </div>
    </form>
</div>

<script>
    const token = localStorage.getItem('token');

    // Додати новий параметр
    document.getElementById('add-param').addEventListener('click', () => {
        const container = document.getElementById('parameters-container');
        const paramBlock = document.createElement('div');
        paramBlock.className = 'border p-4 rounded bg-gray-50 parameter-block relative mt-2';
        paramBlock.innerHTML = `
        <div class="flex gap-4">
            <input type="text" class="param-name w-1/3 border rounded px-2 py-1" placeholder="名称">
            <input type="number" step="0.1" class="param-weight w-1/3 border rounded px-2 py-1" placeholder="权重">
            <input type="text" class="param-unit w-1/3 border rounded px-2 py-1" placeholder="单位 виміру">
            <select id="opt-dir" class="opt-dir w-full border rounded px-4 py-2">
                <option>最小化</option>
                <option>最大化</option>
            </select>
            <button type="button" class="delete-param bg-red-500 text-white rounded px-3 py-1">✕</button>
        </div>`;
        container.appendChild(paramBlock);
        attachDeleteHandlers();
    });

    // Сабміт форми
    document.getElementById('create-task-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const title = document.getElementById('title').value;
        const description = document.getElementById('description').value;
        const category = document.getElementById('category').value;
        const status = document.getElementById('status').value;



        const parameters = [];
        document.querySelectorAll('.parameter-block').forEach(block => {
            parameters.push({
                name: block.querySelector('.param-name').value,
                weight: parseFloat(block.querySelector('.param-weight').value),
                unit: block.querySelector('.param-unit').value,
                optimizationDirection: getOptDir(block)
            });
        });

        const taskData = {
            title,
            description,
            category,
            status,
            taskParameters: parameters
        };

        console.log(JSON.stringify(taskData))
        fetch(`http://localhost:8080/api/v1/tasks`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(taskData)
        })
            .then(response => {
                if (response.ok) {
                    alert('任务创建成功！');
                    window.location.href = '/tasks';
                } else {
                    alert('错误 创建 任务!');
                }
            })
            .catch(error => console.error('错误 при 创建时:', error));
    });

    // Видалення параметра
    function attachDeleteHandlers() {
        document.querySelectorAll('.delete-param').forEach(button => {
            button.addEventListener('click', (e) => {
                e.target.closest('.parameter-block').remove();
            });
        });
    }
    attachDeleteHandlers();
    function getOptDir(block) {
        const dir = block.querySelector('.opt-dir').value;
        if (dir === '最小化') return 'MINIMIZE';
        if (dir === '最大化') return 'MAXIMIZE';
        if (dir === 'MINIMIZE') return 'MINIMIZE';
        if (dir === 'MAXIMIZE') return 'MAXIMIZE';
        return null;
    }
</script>
<script>
    const token = localStorage.getItem('token');

    if (token) {
        document.getElementById('nav-login')?.classList.add('hidden');
        document.getElementById('nav-logout')?.classList.remove('hidden');

        fetch('/api/v1/auth/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(user => {
                const roles = user.roles.map(r => r.name);
                if (roles.includes('ROLE_ADMIN')) {
                    document.getElementById('nav-role')?.classList.remove('hidden');
                    document.getElementById('nav-users')?.classList.remove('hidden');
                }
            })
            .catch(() => {
                localStorage.removeItem('token');
                window.location.href = '/login';
            });
    }

    document.getElementById('nav-logout')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
</body>
</html>
