<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>角色管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 min-h-screen">
<header class="bg-white shadow-md mb-6">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/admin/dashboard" class="text-2xl font-bold text-blue-600">DSS 管理后台</a>

        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/users" class="hover:text-blue-600">用户管理</a>
            <a href="/roles" class="hover:text-blue-600">角色管理</a>
            <a href="/technologies/admin" class="hover:text-blue-600">技术管理</a>
            <a href="/questionnaire/admin" class="hover:text-blue-600">问卷管理</a>
            <a href="#" id="logout-link" class="hover:text-red-600">退出</a>
        </nav>
    </div>
</header>

<div class="max-w-4xl mx-auto bg-white p-8 rounded shadow space-y-6" id="admin-role-section" style="display: none;">
    <h1 class="text-2xl font-bold mb-4 text-center">角色列表</h1>

    <form id="create-role-form" class="flex gap-4 mb-6">
        <input type="text" id="role-name" placeholder="新角色（例如：ROLE_USER）"
               class="flex-1 border px-4 py-2 rounded" required>
        <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
            ➕ 添加
        </button>
    </form>

    <ul id="role-list" class="space-y-3">
        <!-- 动态列表 角色 -->
    </ul>
</div>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = '/login';
    }

    fetch('/api/v1/auth/user', {
        headers: { 'Authorization': `Bearer ${token}` }
    })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(user => {
            const roles = user.roles.map(r => r.name);
            if (!roles.includes('ROLE_ADMIN')) {
                alert('您无权查看此页面');
                window.location.href = '/analyst/dashboard';
                return;
            }

            document.getElementById('admin-role-section').style.display = 'block';
            fetchRoles();
        })
        .catch(() => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

    document.getElementById('logout-link').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });

    function fetchRoles() {
        fetch('/api/v1/roles', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('role-list');
                list.innerHTML = '';
                data.forEach(role => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between bg-gray-50 p-4 rounded shadow-sm';
                    li.innerHTML = `
                    <span class="font-semibold">${role.name}</span>
                    <div class="space-x-2">
                        <button class="edit-btn bg-yellow-500 text-white px-3 py-1 rounded" data-id="${role.id}" data-name="${role.name}">修改</button>
                        <button class="delete-btn bg-red-500 text-white px-3 py-1 rounded" data-id="${role.id}">删除</button>
                    </div>
                `;
                    list.appendChild(li);
                });
                attachHandlers();
            });
    }

    function attachHandlers() {
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                if (confirm('删除角色？')) {
                    fetch(`/api/v1/roles/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(() => fetchRoles());
                }
            };
        });

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                const currentName = btn.getAttribute('data-name');
                const newName = prompt('角色新名称：', currentName);
                if (newName && newName !== currentName) {
                    fetch(`/api/v1/roles/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: newName
                    }).then(() => fetchRoles());
                }
            };
        });
    }

    document.getElementById('create-role-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('role-name').value.trim();
        if (!name) return;

        fetch('/api/v1/roles', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: name
        }).then(() => {
            document.getElementById('role-name').value = '';
            fetchRoles();
        });
    });

</script>
</body>
</html>
