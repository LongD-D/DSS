<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>德尔菲问卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
<header class="fixed top-0 left-0 w-full z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/tasks" class="text-2xl font-bold text-blue-600">DSS 系统</a>

        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/tasks" class="hover:text-blue-600">任务</a>
            <a href="/questionnaire" class="text-blue-600">问卷</a>
            <a href="/login" class="hover:text-blue-600">登录</a>
        </nav>
    </div>
</header>

<div class="max-w-5xl mx-auto pt-24">
    <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h1 class="text-3xl font-bold text-center">德尔菲调查问卷</h1>
        <p class="text-center text-gray-600 mt-2">本次问卷从固定题库中随机抽取题目，请根据 1-5 分标准进行评分（1=非常不同意，5=非常同意）。</p>
    </div>

    <form method="post" th:action="@{/questionnaire/submit}" class="space-y-4">
        <div th:each="question, stat : ${questions}" class="bg-white rounded-xl shadow p-5">
            <p class="text-sm font-semibold text-blue-600 mb-2" th:text="'维度：' + ${question.dimension}"></p>
            <label class="block text-lg font-medium mb-4" th:text="${stat.count} + '. ' + ${question.text}"></label>

            <div class="flex flex-wrap gap-3">
                <label th:each="option : ${scoreOptions}" class="inline-flex items-center gap-1 bg-gray-100 px-3 py-2 rounded cursor-pointer hover:bg-blue-50">
                    <input type="radio"
                           th:name="${'score_' + question.id}"
                           th:value="${option}"
                           required>
                    <span th:text="${option}"></span>
                </label>
            </div>
        </div>

        <div class="flex justify-center mt-6">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition">
                提交问卷
            </button>
        </div>
    </form>
</div>
</body>
</html>
