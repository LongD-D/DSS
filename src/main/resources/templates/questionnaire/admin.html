<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>问卷后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/tasks" class="text-2xl font-bold text-blue-600">DSS 系统</a>

        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/tasks" class="hover:text-blue-600">任务</a>
            <a href="/decisions" class="hover:text-blue-600">技术</a>
            <a href="/questionnaire" class="hover:text-blue-600">问卷</a>
            <a href="/technologies/admin" id="tech-admin-link" class="hover:text-blue-600 hidden">技术后台</a>
            <a href="/questionnaire/admin" id="question-admin-link" class="hover:text-blue-600 hidden">问卷后台</a>
            <a href="/users" id="users-link" class="hover:text-blue-600 hidden">用户</a>
            <a href="/login" id="login-link" class="hover:text-blue-600">登录</a>
            <a href="#" id="logout-link" class="hover:text-red-600 hidden">退出</a>
        </nav>
    </div>
</header>

<main id="admin-section" class="max-w-6xl mx-auto p-6 hidden">
    <div class="bg-white rounded-lg shadow p-6 mb-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">问卷后台管理</h1>
            <button id="clear-btn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">清空提交记录</button>
        </div>
        <p class="text-gray-500 mt-2">用于查看问卷提交历史与各维度均分。</p>
    </div>

    <div class="bg-white rounded-lg shadow p-4 overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead>
            <tr class="border-b text-left">
                <th class="p-3">提交时间</th>
                <th class="p-3">技术成熟度</th>
                <th class="p-3">经济性</th>
                <th class="p-3">生态影响</th>
                <th class="p-3">法规适配</th>
            </tr>
            </thead>
            <tbody id="submission-body"></tbody>
        </table>
    </div>
</main>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = '/login';
    }

    fetch('/api/v1/auth/user', { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(user => {
            const roles = user.roles.map(r => r.name);
            const isAdmin = roles.includes('ROLE_ADMIN');
            if (!isAdmin) {
                alert('您无权访问问卷后台。');
                window.location.href = '/questionnaire';
                return;
            }

            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('question-admin-link').classList.remove('hidden');
            document.getElementById('tech-admin-link').classList.remove('hidden');
            document.getElementById('users-link').classList.remove('hidden');
            document.getElementById('login-link').classList.add('hidden');
            document.getElementById('logout-link').classList.remove('hidden');

            loadSubmissions();
        })
        .catch(() => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

    function loadSubmissions() {
        fetch('/api/v1/questionnaire/admin/submissions', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(data => {
                const body = document.getElementById('submission-body');
                body.innerHTML = '';

                if (!data.length) {
                    body.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">暂无提交记录</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const d = item.dimensionAverage || {};
                    const row = document.createElement('tr');
                    row.className = 'border-b';
                    row.innerHTML = `
                        <td class="p-3">${new Date(item.submittedAt).toLocaleString()}</td>
                        <td class="p-3">${formatScore(d['技术成熟度'])}</td>
                        <td class="p-3">${formatScore(d['经济性'])}</td>
                        <td class="p-3">${formatScore(d['生态影响'])}</td>
                        <td class="p-3">${formatScore(d['法规适配'])}</td>
                    `;
                    body.appendChild(row);
                });
            })
            .catch(() => alert('加载问卷提交记录失败'));
    }

    function formatScore(score) {
        if (score === undefined || score === null) return '-';
        return Number(score).toFixed(2);
    }

    document.getElementById('clear-btn').addEventListener('click', () => {
        if (!confirm('确定清空所有问卷提交记录吗？')) {
            return;
        }

        fetch('/api/v1/questionnaire/admin/submissions', {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => {
                if (!res.ok) {
                    throw new Error('clear failed');
                }
                loadSubmissions();
            })
            .catch(() => alert('清空失败'));
    });

    document.getElementById('logout-link').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
</body>
</html>
