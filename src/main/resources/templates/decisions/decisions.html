<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>我的 方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pt-20 px-6">
<header class="fixed top-0 left-0 w-full z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/analyst/dashboard" class="text-2xl font-bold text-blue-600">DSS | 我的 方案</a>
        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/tasks" class="hover:text-blue-600">任务管理</a>
            <a href="/decisions" class="hover:text-blue-600">决策方案</a>
            <a href="#" id="logout-link" class="hover:text-red-600">退出</a>
        </nav>
    </div>
</header>

<div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-6">我的 方案</h1>
    <ul id="my-decisions-list" class="space-y-4"></ul>
</div>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = '/login';
    } else {
        fetch('/api/v1/decisions/my', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        })
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('my-decisions-list');
                list.innerHTML = '';

                data.forEach(decision => {
                    const item = document.createElement('li');
                    item.className = 'p-4 bg-gray-50 border rounded hover:bg-gray-100';
                    item.innerHTML = `
                    <a href="/decisions/${decision.id}" class="text-blue-600 hover:underline text-lg font-medium">
                        ${decision.title || '方案 #' + decision.id}
                    </a>
                    <p class="text-sm text-gray-700 mt-1">${decision.description}</p>
                    <p class="text-sm text-gray-600">类别： ${decision.decisionCategory} | 创建于: ${decision.created}</p>
                    <p class="text-sm text-gray-500">作者： ${decision.user.name}</p>
                `;
                    list.appendChild(item);
                });
            })
            .catch(error => {
                console.error('错误： 加载 方案:', error);
                alert('无法获取列表 方案.');
            });
    }

    // Logout handler
    document.getElementById('logout-link')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
</body>
</html>
