<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>详情 方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow space-y-10">

    <header class="fixed top-0 left-0 w-full z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/tasks" class="text-2xl font-bold text-blue-600">DSS 系统</a>

            <nav class="flex items-center gap-6 text-gray-700 font-semibold">
                <a href="/tasks" class="hover:text-blue-600">任务管理</a>
                <a href="/decisions" class="hover:text-blue-600">决策方案</a>
                <a href="/roles" id="role-link" class="hover:text-blue-600 hidden">角色管理</a>
                <a href="/users" id="users-link" class="hover:text-blue-600 hidden">用户管理</a>
                <a href="/login" id="login-link" class="hover:text-blue-600">登录</a>
                <a href="#" id="logout-link" class="hover:text-red-600 hidden">退出</a>
            </nav>
        </div>
    </header>

    <a th:href="@{'/tasks/'+${decision.task.id}}" class="space-y-2" style="display: block">
        <h2 class="text-xl font-bold">关联任务</h2>
        <p><strong>名称：</strong> <span th:text="${decision.task.title}"></span></p>
        <p><strong>描述：</strong> <span th:text="${decision.task.description}"></span></p>
        <p><strong>类别：</strong> <span th:text="${decision.task.category.label}"></span></p>
        <p><strong>状态：</strong> <span th:text="${decision.task.status.label}"></span></p>

        <h3 class="text-lg font-semibold mt-4">任务参数</h3>
        <table class="w-full border text-sm">
            <thead class="bg-gray-100">
            <tr>
                <th class="p-2 border">名称</th>
                <th class="p-2 border">权重</th>
                <th class="p-2 border">单位</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="parameter : ${decision.task.taskParameters}">
                <td class="p-2 border" th:text="${parameter.name}"></td>
                <td class="p-2 border" th:text="${parameter.weight}"></td>
                <td class="p-2 border" th:text="${parameter.unit}"></td>
            </tr>
            </tbody>
        </table>
    </a>

    <!-- 方案 -->
    <div class="space-y-2">
        <h1 class="text-2xl font-bold">
            方案 #<span id="decision-id" th:text="${decision.id}">ID</span>
        </h1>

        <p><strong>类型：</strong> <span th:text="${decision.task.category.label}"></span></p>
        <p><strong>名称：</strong> <span th:text="${decision.title}"></span></p>
        <p><strong>描述：</strong> <span th:text="${decision.description}"></span></p>
        <p><strong>创建于:</strong> <span th:text="${decision.created}"></span></p>
        <p><strong>作者：</strong> <span id="decision-user-id" th:data-user-id="${decision.user.id}" th:text="${decision.user.name}">作者</span></p>
        <p><strong>状态：</strong> <span id="decision-status" th:text="${decision.decisionStatus.ukrName}">STATUS</span></p>
        <p><strong>评分：</strong> <span th:text="${#numbers.formatDecimal(decision.getRate(), 1, 2) + '/10'}"></span></p>
        <p><strong>评分数量：</strong> <span th:text="${decision.expertEvaluations.size()}"></span></p>
        <!-- 作者按钮区 -->
        <div id="action-buttons" class="bg-white p-4 rounded shadow flex flex-wrap gap-4 items-center">
            <a href="/decisions" class="text-blue-600 hover:underline">← 返回列表</a>
        </div>
    </div>

    <!-- 参数 方案 -->
    <div>
        <h2 class="text-xl font-bold mb-4">参数 方案</h2>
        <table class="w-full border text-sm">
            <thead class="bg-gray-100">
            <tr>
                <th class="p-2 border">参数</th>
                <th class="p-2 border">值</th>
                <th class="p-2 border">单位</th>
                <th class="p-2 border">评论</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="parameter : ${decision.decisionParameters}">
                <td class="p-2 border" th:text="${parameter.taskParameter.name}"></td>
                <td class="p-2 border" th:text="${parameter.value}"></td>
                <td class="p-2 border" th:text="${parameter.taskParameter.unit}"></td>
                <td class="p-2 border" th:text="${parameter.comment}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <button
            id="rate-decision-button"
            class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded ml-4 mt-2 hidden">
        评分 方案
    </button>



    <!-- 分析员面板 -->
    <div id="analyst-panel" class="hidden bg-white p-6 rounded shadow space-y-4">
        <div>
            <label for="analyst-comment" class="block mb-2 text-sm font-medium text-gray-700">评论（可选）:</label>
            <textarea id="analyst-comment" rows="3" class="w-full border p-2 rounded"></textarea>
        </div>
        <div class="flex flex-wrap gap-4" id="status-buttons"></div>
    </div>

    <!-- 专家评分 -->
    <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">专家评分</h2>
        <div th:if="${decision.expertEvaluations.size() == 0}" class="text-gray-600 italic">暂无评分。</div>
        <table th:if="${decision.expertEvaluations.size() > 0}" class="w-full text-sm border">
            <thead class="bg-gray-100">
            <tr>
                <th class="border p-2">专家</th>
                <th class="border p-2">角色</th>
                <th class="border p-2">评分</th>
                <th class="border p-2">评论</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="eval : ${decision.expertEvaluations}">
                <td class="border p-2" th:text="${eval.expert.name}"></td>
                <td class="border p-2" th:each="role : ${eval.expert.roles}" th:text="${role.ukrName}"></td>
                <td class="border p-2" th:text="${eval.score}"></td>
                <td class="border p-2" th:text="${eval.comment}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<div id="rate-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded shadow-lg w-full max-w-md">
        <h2 class="text-xl font-bold mb-4 text-center">评分 方案</h2>
        <label class="block mb-2">评分 (0-10)：</label>
        <input type="number" id="rate-score" class="w-full border p-2 rounded mb-4" min="0" max="10" step="0.1">
        <label class="block mb-2">评论（可选）：</label>
        <textarea id="rate-comment" class="w-full border p-2 rounded mb-4"></textarea>
        <div class="flex justify-end gap-4">
            <button onclick="submitRate()" class="bg-green-500 text-white py-2 px-4 rounded">提交</button>
            <button onclick="closeRateModal()" class="bg-gray-400 text-white py-2 px-4 rounded">取消</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const decisionId = document.getElementById('decision-id').innerText;
    const decisionUserId = parseInt(document.getElementById('decision-user-id').getAttribute('data-user-id'));
    const currentStatus = document.getElementById('decision-status')?.innerText?.trim();

    fetch('/api/v1/auth/user', {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
    })
        .then(res => res.json())
        .then(user => {
            const currentUserId = user.id;
            const roles = user.roles.map(r => r.name);
            if (['ECOLOGIST', 'ECONOMIST', 'POWER_ENGINEER', 'LAWEYR'].some(role => roles.includes(role))) {
                const rateBtn = document.getElementById('rate-decision-button');
                rateBtn.classList.remove('hidden');
                rateBtn.onclick = () => openRateModal(decisionId);
            }

            const container = document.getElementById('action-buttons');

            if (currentUserId === decisionUserId) {
                const editBtn = document.createElement('a');
                editBtn.href = `/decisions/${decisionId}/edit`;
                editBtn.className = 'text-yellow-600 hover:underline';
                editBtn.innerText = '编辑';

                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '删除';
                deleteBtn.className = 'text-red-600 hover:underline';
                deleteBtn.onclick = () => {
                    if (confirm('你确定要删除这个 方案?')) deleteDecision();
                };

                container.appendChild(editBtn);
                container.appendChild(deleteBtn);
            }

            if (roles.includes('ANALYST')) {
                const panel = document.getElementById('analyst-panel');
                const statusContainer = document.getElementById('status-buttons');
                const statusMap = ['已批准', '已拒绝', '已提议'];

                for (const status of statusMap) {
                    if (status !== currentStatus) {
                        const btn = document.createElement('button');
                        btn.innerText = status;
                        btn.className = {
                            '已批准': 'bg-green-500 hover:bg-green-600',
                            '已拒绝': 'bg-red-500 hover:bg-red-600',
                            '已提议': 'bg-blue-500 hover:bg-blue-600'
                        }[status] + ' text-white py-2 px-4 rounded';
                        btn.onclick = () => updateStatus(status);
                        statusContainer.appendChild(btn);
                    }
                }

                panel.classList.remove('hidden');
            }
        })
        .catch(err => console.error('Auth error', err));

    function updateStatus(status) {
        const comment = document.getElementById('analyst-comment').value.trim();
        let statusValue;

        if (status === '已拒绝'){
            statusValue = 'REJECTED';
        }
        if (status === '已批准'){
            statusValue = 'APPROVED';
        }
        if (status === '已提议'){
            statusValue = 'PROPOSED';
        }
        if (status === '已拒绝' && comment === '') {
            alert('拒绝时必须填写评论。');
            return;
        }
        console.log(statusValue)
        fetch(`/api/v1/decisions/${decisionId}/status`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({status: statusValue, comment })
        })
            .then(res => {
                if (res.ok) {
                    alert('状态 已更新!');
                    location.reload();
                } else {
                    alert('错误 更新 状态');
                }
            });
    }

    function deleteDecision() {
        fetch(`/api/v1/decisions/${decisionId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => {
                if (res.status === 204) {
                    alert('方案 已删除');
                    window.location.href = '/decisions';
                } else {
                    return res.text().then(msg => { throw new Error(msg || '错误 删除'); });
                }
            })
            .catch(err => {
                console.error(err);
                alert('无法 删除 方案');
            });
    }
</script>

<script>
    const token = localStorage.getItem('token');

    if (token) {
        document.getElementById('nav-login')?.classList.add('hidden');
        document.getElementById('nav-logout')?.classList.remove('hidden');

        fetch('/api/v1/auth/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(user => {
                const roles = user.roles.map(r => r.name);
                if (roles.includes('ROLE_ADMIN')) {
                    document.getElementById('nav-role')?.classList.remove('hidden');
                    document.getElementById('nav-users')?.classList.remove('hidden');
                }
            })
            .catch(() => {
                localStorage.removeItem('token');
                window.location.href = '/login';
            });
    }

    document.getElementById('nav-logout')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
<script th:src="@{/js/evaluation.js}"> </script>

</body>
</html>
