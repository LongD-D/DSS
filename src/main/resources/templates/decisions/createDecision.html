<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>创建方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
<header class="fixed top-0 left-0 w-full z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/tasks" class="text-2xl font-bold text-blue-600">DSS 系统</a>

        <nav class="flex items-center gap-6 text-gray-700 font-semibold">
            <a href="/tasks" class="hover:text-blue-600">任务</a>
            <a href="/decisions" class="hover:text-blue-600">方案</a>
            <a href="/roles" id="role-link" class="hover:text-blue-600 hidden">角色</a>
            <a href="/users" id="users-link" class="hover:text-blue-600 hidden">用户</a>
            <a href="/login" id="login-link" class="hover:text-blue-600">登录</a>
            <a href="#" id="logout-link" class="hover:text-red-600 hidden">退出</a>
        </nav>
    </div>
</header>

<div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold mb-6 text-center">为任务创建方案</h1>

    <!-- 任务信息 -->
    <div id="task-info" class="mb-8 p-6 bg-gray-50 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">任务信息</h2>

        <div class="space-y-2">
            <p class="text-lg text-gray-700">
                <strong class="text-gray-900">名称：</strong> <span id="task-title" class="text-blue-600 font-semibold" th:text="${task.title}"></span>
            </p>
            <p class="text-lg text-gray-700">
                <strong class="text-gray-900">描述：</strong> <span id="task-description" th:text="${task.description}"></span>
            </p>
            <p class="text-lg text-gray-700">
                <strong class="text-gray-900">类别：</strong> <span id="task-category" th:text="${task.category.label}"></span>
            </p>
            <p class="text-lg text-gray-700">
                <strong class="text-gray-900">状态：</strong> <span id="task-category" th:text="${task.status.label}"></span>
            </p>
        </div>

    </div>

    <!-- 创建方案表单 -->
    <form id="create-decision-form" class="space-y-6">

        <!-- Nsme 方案 -->
        <div>
            <label class="block text-gray-700 font-semibold mb-2" for="description">名称 方案</label>
            <textarea id="title" class="w-full border rounded px-4 py-2" rows="4" placeholder="请输入方案名称"></textarea>
        </div>
        <!-- 描述 方案 -->
        <div>
            <label class="block text-gray-700 font-semibold mb-2" for="description">描述 方案</label>
            <textarea id="description" class="w-full border rounded px-4 py-2" rows="4" placeholder="请输入描述 方案"></textarea>
        </div>

        <!-- 参数 方案 -->
        <div class="mt-6">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">参数 方案</h3>
            <div id="parameters-container" class="space-y-4">
                <div th:each="parameter : ${task.taskParameters}" class="bg-gray-50 p-4 rounded-lg shadow-sm flex flex-wrap items-center gap-3 parameter-block">
                    <div class="flex-1 min-w-[200px]">
                        <p class="text-gray-800 font-semibold" th:text="${parameter.name}"></p>
                    </div>
                    <div class="w-20">
                        <p class="text-gray-600 text-center" th:text="${parameter.weight}"></p>
                    </div>
                    <div class="w-28">
                        <p class="text-gray-600 text-center" th:text="${parameter.unit}"></p>
                    </div>
                    <input type="number" step="0.01" placeholder="值" class="param-value w-28 border rounded px-2 py-1" />
                    <input type="text" placeholder="评论" class="param-comment flex-1 border rounded px-2 py-1" />
                    <input type="hidden" class="task-parameter-id" th:value="${parameter.id}" />
                </div>
            </div>
        </div>

        <!-- 情景 方案 -->
        <div class="mt-6">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">情景 方案</h3>
            <div id="scenarios-container" class="space-y-4">
                <!-- 这里将显示场景 -->
            </div>
            <button type="button" id="add-scenario" class="mt-4 bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg">
                添加情景
            </button>
        </div>

        <!-- 创建按钮 -->
        <div class="flex justify-center mt-8">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-8 rounded-lg">
                创建方案
            </button>
        </div>

    </form>

</div>

<script src="/js/createDecision.js"></script>
<script>
    const token = localStorage.getItem('token');

    if (token) {
        document.getElementById('nav-login')?.classList.add('hidden');
        document.getElementById('nav-logout')?.classList.remove('hidden');

        fetch('/api/v1/auth/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(user => {
                const roles = user.roles.map(r => r.name);
                if (roles.includes('ROLE_ADMIN')) {
                    document.getElementById('nav-role')?.classList.remove('hidden');
                    document.getElementById('nav-users')?.classList.remove('hidden');
                }
            })
            .catch(() => {
                localStorage.removeItem('token');
                window.location.href = '/login';
            });
    }

    document.getElementById('nav-logout')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
</body>
</html>
