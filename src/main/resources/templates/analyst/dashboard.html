<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>分析员工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/analyst/dashboard" class="text-2xl font-bold text-blue-600">DSS 分析员工作台</a>
        <div class="flex items-center gap-4">
            <a id="admin-entry" href="/admin/dashboard" class="text-sm text-blue-600 hover:underline hidden">进入管理员后台</a>
            <button id="logout-link" class="text-red-600 hover:text-red-700 font-semibold">退出</button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">分析员工作台</h1>
    <p class="text-gray-600 mb-8">专注问卷填写与技术分析流程，减少不必要管理操作干扰。</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <a href="/questionnaire" class="bg-white rounded-xl shadow p-6 hover:shadow-lg transition">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">问卷模块</h2>
            <p class="text-gray-600">填写并提交问卷，获取各维度评分结果。</p>
        </a>
        <a href="/tasks" class="bg-white rounded-xl shadow p-6 hover:shadow-lg transition">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">技术分析</h2>
            <p class="text-gray-600">创建、查看、维护技术分析任务。</p>
        </a>
        <a href="/decisions" class="bg-white rounded-xl shadow p-6 hover:shadow-lg transition">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">决策分析</h2>
            <p class="text-gray-600">查看评估结果并支持决策过程。</p>
        </a>
    </div>
</main>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = '/login';
    } else {
        fetch('/api/v1/auth/user', {
            headers: {'Authorization': `Bearer ${token}`}
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(user => {
                const roles = user.roles.map(r => r.name);
                const isAdmin = roles.includes('ROLE_ADMIN');
                const isAnalyst = roles.includes('ANALYST');

                if (!isAdmin && !isAnalyst) {
                    window.location.href = '/questionnaire';
                    return;
                }

                if (isAdmin) {
                    document.getElementById('admin-entry').classList.remove('hidden');
                }
            })
            .catch(() => {
                localStorage.removeItem('token');
                window.location.href = '/login';
            });
    }

    document.getElementById('logout-link').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });
</script>
</body>
</html>
